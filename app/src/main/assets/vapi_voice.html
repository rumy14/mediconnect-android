<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MediConnect AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0f;
    color: #fff;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 0;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    padding-top: 24px;
    flex-shrink: 0;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-mic-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #22c55e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .header-title {
    font-size: 16px;
    font-weight: 600;
    color: #fff;
  }
  .header-close {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: #fff;
    border: none;
    transition: background 0.2s;
  }
  .header-close:active { background: rgba(255,255,255,0.2); }

  /* Center area - mic visualization */
  .mic-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  .mic-circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: #22c55e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    transition: all 0.3s ease;
    box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
    position: relative;
  }
  .mic-circle.active {
    animation: pulse-glow 2s ease-in-out infinite;
  }
  .mic-circle.speaking {
    background: #3b82f6;
    box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4);
    animation: pulse-glow-blue 2s ease-in-out infinite;
  }
  .mic-circle.error {
    background: #ef4444;
    box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
    animation: pulse-glow-red 2s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5); transform: scale(1); }
    50% { box-shadow: 0 0 30px 10px rgba(34, 197, 94, 0.2); transform: scale(1.03); }
    100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5); transform: scale(1); }
  }
  @keyframes pulse-glow-blue {
    0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5); transform: scale(1); }
    50% { box-shadow: 0 0 30px 10px rgba(59, 130, 246, 0.2); transform: scale(1.03); }
    100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5); transform: scale(1); }
  }
  @keyframes pulse-glow-red {
    0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
    50% { box-shadow: 0 0 30px 10px rgba(239, 68, 68, 0.2); }
    100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
  }

  .status-text {
    font-size: 16px;
    font-weight: 500;
    margin-top: 16px;
    color: #fff;
    min-height: 22px;
  }
  .sub-status {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-top: 4px;
    min-height: 16px;
  }

  /* Chat transcript */
  .chat-area {
    flex-shrink: 0;
    max-height: 200px;
    overflow-y: auto;
    padding: 0 20px 16px;
    display: none;
    -webkit-overflow-scrolling: touch;
  }
  .chat-area.visible { display: block; }

  .chat-bubble {
    margin-bottom: 8px;
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
  }
  .chat-bubble.user {
    background: #2563eb;
    color: #fff;
    align-self: flex-end;
    margin-left: auto;
    border-bottom-right-radius: 4px;
  }
  .chat-bubble.assistant {
    background: #1e293b;
    color: #e2e8f0;
    align-self: flex-start;
    margin-right: auto;
    border-bottom-left-radius: 4px;
  }
  .chat-area-inner {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .connecting-dots::after {
    content: '';
    animation: dots 1.5s steps(3, end) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    33% { content: '.'; }
    66% { content: '..'; }
    100% { content: '...'; }
  }
</style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="header-mic-icon">🎤</div>
      <span class="header-title">MediConnect AI</span>
    </div>
    <button class="header-close" id="closeBtn">✕</button>
  </div>

  <!-- Mic visualization -->
  <div class="mic-area">
    <div class="mic-circle" id="micCircle">🎤</div>
    <div class="status-text" id="statusText">Connecting<span class="connecting-dots"></span></div>
    <div class="sub-status" id="subStatus">Starting AI voice assistant...</div>
  </div>

  <!-- Chat transcript -->
  <div class="chat-area" id="chatArea">
    <div class="chat-area-inner" id="chatList"></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "@vapi-ai/web": "https://esm.sh/@vapi-ai/web@latest"
    }
  }
  </script>
  <script type="module">
    import Vapi from '@vapi-ai/web';

    const ASSISTANT_ID = '__ASSISTANT_ID__';
    const PUBLIC_KEY  = '***';

    const micCircle = document.getElementById('micCircle');
    const statusText = document.getElementById('statusText');
    const subStatus = document.getElementById('subStatus');
    const chatArea = document.getElementById('chatArea');
    const chatList = document.getElementById('chatList');
    const closeBtn = document.getElementById('closeBtn');

    let vapi = null;

    function setStatus(state, primary, secondary) {
      micCircle.className = 'mic-circle';
      if (state === 'connecting') {
        micCircle.classList.add('active');
        statusText.textContent = primary || 'Connecting...';
        subStatus.textContent = secondary || '';
      } else if (state === 'listening') {
        micCircle.classList.add('active');
        statusText.textContent = primary || 'Listening...';
        subStatus.textContent = secondary || 'Speak now';
      } else if (state === 'speaking') {
        micCircle.classList.add('speaking');
        statusText.textContent = primary || 'Assistant is speaking...';
        subStatus.textContent = secondary || '';
      } else if (state === 'error') {
        micCircle.classList.add('error');
        statusText.textContent = primary || 'Connection error';
        subStatus.textContent = secondary || 'Please try again';
      } else {
        statusText.textContent = primary || '';
        subStatus.textContent = secondary || '';
      }
    }

    function addChatBubble(role, text) {
      chatArea.classList.add('visible');
      const bubble = document.createElement('div');
      bubble.className = `chat-bubble ${role}`;
      bubble.textContent = text;
      chatList.appendChild(bubble);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function startCall() {
      try {
        vapi = new Vapi(PUBLIC_KEY);
      } catch (e) {
        setStatus('error', 'Failed to initialize', e.message);
        return;
      }

      vapi.on('call-start', () => {
        setStatus('listening', 'Connected', 'I\'m listening — go ahead!');
      });

      vapi.on('call-end', () => {
        setStatus('listening', 'Call ended', 'You can close this window');
      });

      vapi.on('speech-start', () => {
        setStatus('speaking', 'Assistant is speaking...', '');
      });

      vapi.on('speech-end', () => {
        setStatus('listening', 'Listening...', 'Your turn to speak');
      });

      vapi.on('message', (msg) => {
        if (msg.type === 'transcript' && msg.transcript) {
          addChatBubble(msg.role, msg.transcript);
        }
        if (msg.type === 'error') {
          console.error('VAPI error:', msg);
        }
      });

      vapi.on('error', (e) => {
        console.error('VAPI error:', e);
        setStatus('error', 'Connection error', typeof e === 'string' ? e : 'Please try again');
      });

      setStatus('connecting', 'Connecting...', 'Establishing voice connection');

      try {
        vapi.start(ASSISTANT_ID);
      } catch (e) {
        setStatus('error', 'Failed to start', e.message);
      }
    }

    function endCall() {
      if (vapi) {
        try { vapi.stop(); } catch(e) { /* ignore */ }
      }
      setStatus('listening', 'Call ended', 'You can close this window');
    }

    // Auto-start when page loads
    startCall();

    // Close button — notify Android via VapiBridge
    closeBtn.addEventListener('click', () => {
      endCall();
    });

    // Expose for Android bridge
    window.VapiBridge = {
      start: startCall,
      end: endCall
    };
  </script>
</body>
</html>
