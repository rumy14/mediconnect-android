<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VC Engine</title>
<style>
  html, body { width: 100%; height: 100%; margin: 0; padding: 0; background: transparent; overflow: hidden; }
</style>
<script type="importmap">
{ "imports": { "@vapi-ai/web": "https://esm.sh/@vapi-ai/web@latest" } }
</script>
<script type="module">
import Vapi from '@vapi-ai/web';

const ASSISTANT_ID = '__ASSISTANT_ID__';
const PUBLIC_KEY = '__PUBLIC_KEY__';
let USER_JWT = '__USER_JWT__';
let USER_NAME = '__USER_NAME__';

// Engine state
let vapi = null;
let connected = false;
let endTriggered = false;
let bookingSent = false;
let callStartTime = null;
let timerInterval = null;

// Context
let assistantContext = [];
let userContext = [];
let extractedFields = { doctorId: null, doctorName: null, date: null, time: null, reason: null };
let lastUserSpeechTime = Date.now();
let inactivityCheckId = null;
let bookingEndTimeoutId = null;

const API_BASE = '__API_BASE__';
let availableDoctors = [];

// ── Comprehensive end-call patterns ──
const END_CALL_PATTERNS = [
  // Direct goodbyes
  /\bgoodbye\b/i, /\bbye[\s.!]/i, /\bbye-bye\b/i,
  /\btake care\b/i, /\bsee you\b/i, /\bsee ya\b/i,
  /\bhave a great (?:day|weekend|evening|afternoon|night|morning|week)\b/i,
  /\bhave a wonderful\b/i, /\bstay safe\b/i,
  /\bnice talking to you\b/i, /\bnice chatting\b/i,
  /\bgreat talking\b/i,
  /\bspeak (?:to you|again|soon) (?:soon|later|again)\b/i,
  /\btalk (?:to you|again|soon) (?:soon|later|again)\b/i,
  // Direct end-call phrases
  /\bend(?:ing)? the call\b/i, /\bdrop(?:ping)? the call\b/i,
  /\bhang(?:ing)? up\b/i, /\bending (?:this|our) conversation\b/i,
  // Agent-led closing
  /i(?:'ll| will) (?:end|drop|hang up|let you go)\b/i,
  /i(?:'ve| have) (?:to )?(?:end|drop|let you go)\b/i,
  /let me (?:end|hang up|disconnect)\b/i,
  // Thank you + closing
  /\bthank you (?:for (?:calling|chatting|your time|reaching out))\b.*\b(?:bye|goodbye|have a great)\b/i,
  /(?:bye|goodbye).*\bthank you\b/i,
  // Post-booking confirmation wrap-up  
  /(?:is all set|all taken care of|everything is set).*\b(?:anything else|else can I)\b/i,
  /is there anything else (?:I can |else I can )?help you with/i,
  // Multi-phrase closers
  /(?:thank you|thanks).*(?:goodbye|bye|have a good)/i,
];

// ── Booking confirmation patterns ──
const BOOKING_CONFIRM_PATTERNS = [
  /appointment (?:has been )?(?:booked|confirmed|scheduled|set|created|reserved)/i,
  /(?:booked|confirmed|scheduled|set|created|reserved) your appointment/i,
  /your appointment (?:is|has been) (?:booked|confirmed|scheduled)/i,
  /i(?:'ve| have) (?:booked|scheduled|confirmed|set up|created|reserved) (?:your |an )?appointment/i,
  /you'?re all set\b/i,
  /all set (?:for|with)\b/i,
  /confirmed for\b/i,
  /you'?re scheduled\b/i,
  /i'?ll (?:see you|send you|email you)\b/i,
  /i'?ve gone ahead and\b.*(?:booked|scheduled|set)/i,
];

// ── Wake up the Kotlin side ──
function notifyState(type, data) {
  try {
    if (window.AndroidBridge) {
      window.AndroidBridge.onEngineState(type, data ? JSON.stringify(data) : '');
    }
  } catch(e) {}
}

function notifyTranscript(role, text) {
  try {
    if (window.AndroidBridge) {
      window.AndroidBridge.onTranscript(role, text, new Date().toISOString(), 'final');
    }
  } catch(e) {}
}

function notifyMetadata(key, value) {
  try {
    if (window.AndroidBridge) {
      window.AndroidBridge.onMetadata(key, value);
    }
  } catch(e) {}
}

function notifyBookingDone(info) {
  try {
    if (window.AndroidBridge) {
      window.AndroidBridge.onBookingComplete(info ? JSON.stringify(info) : '');
    }
  } catch(e) {}
}

function notifyCallEnded() {
  try {
    if (window.AndroidBridge) {
      window.AndroidBridge.onCallEnded();
    }
  } catch(e) {}
}

// ── Inactivity monitor ──
function startInactivityMonitor() {
  if (inactivityCheckId) clearInterval(inactivityCheckId);
  inactivityCheckId = setInterval(() => {
    if (!connected || endTriggered) {
      clearInterval(inactivityCheckId);
      inactivityCheckId = null;
      return;
    }
    // If booking was sent and user hasn't spoken in 12s → auto-end
    if (bookingSent) {
      const idle = (Date.now() - lastUserSpeechTime) / 1000;
      if (idle > 12) {
        console.log('Inactivity timeout after booking: ' + Math.round(idle) + 's idle');
        clearInterval(inactivityCheckId);
        inactivityCheckId = null;
        scheduleEnd(1000);
      }
    }
  }, 2000);
}

// ── Schedule end with a delay (cancellable) ──
function scheduleEnd(delayMs) {
  if (endTriggered) return;
  endTriggered = true;
  if (bookingEndTimeoutId) clearTimeout(bookingEndTimeoutId);
  if (inactivityCheckId) { clearInterval(inactivityCheckId); inactivityCheckId = null; }
  console.log('Scheduling call end in ' + delayMs + 'ms');
  setTimeout(() => { end(); }, delayMs);
}

// ── Quick ending for no-booking calls ──
function scheduleEndQuick() {
  scheduleEnd(1500);
}

// ── Post-booking end ──
function scheduleEndAfterBooking() {
  // When booking is confirmed, send notification and auto-end after short delay
  if (bookingEndTimeoutId) clearTimeout(bookingEndTimeoutId);
  bookingEndTimeoutId = setTimeout(() => {
    if (!endTriggered) {
      notifyState('booking_ready', extractedFields);
      scheduleEnd(500);
    }
  }, 2000);
}

// ── Flush accumulated booking data to Android ──
function flushBooking(context) {
  const ctx = context || [...assistantContext, ...userContext].join(' ');
  const doctor = findDoctor(ctx);
  const dateStr = extractDate(ctx);
  const timeStr = extractTime(ctx);

  if (doctor) {
    extractedFields.doctorId = doctor.id;
    extractedFields.doctorName = (doctor.firstName + ' ' + doctor.lastName).trim();
  }
  if (dateStr) extractedFields.date = dateStr;
  if (timeStr) extractedFields.time = timeStr;

  if (extractedFields.doctorName || extractedFields.date || extractedFields.time) {
    if (extractedFields.doctorId) notifyMetadata('doctorId', extractedFields.doctorId);
    if (extractedFields.doctorName) notifyMetadata('doctorName', extractedFields.doctorName);
    if (extractedFields.date) notifyMetadata('appointmentDate', extractedFields.date);
    if (extractedFields.time) notifyMetadata('appointmentTime', extractedFields.time);
    notifyMetadata('reason', extractedFields.reason || 'Booked via voice AI assistant');
    bookingSent = true;
    return true;
  }
  return false;
}

// ── Add a message bubble (transcript tracking only, no UI) ──
function addBubble(role, text) {
  if (!text) return;

  // Push transcript to Android for storage
  notifyTranscript(role, text);

  // Context tracking
  if (role === 'assistant') {
    assistantContext.push(text);
    if (assistantContext.length > 10) assistantContext.shift();
  } else {
    userContext.push(text);
    if (userContext.length > 5) userContext.shift();
    lastUserSpeechTime = Date.now();
  }

  const combinedContext = [...assistantContext, ...userContext].join(' ');

  // ── Book appointment detection (extract from every message) ──
  if (!bookingSent) {
    const doctor = findDoctor(combinedContext);
    const dateStr = extractDate(combinedContext);
    const timeStr = extractTime(combinedContext);

    if (doctor) {
      extractedFields.doctorId = doctor.id;
      extractedFields.doctorName = (doctor.firstName + ' ' + doctor.lastName).trim();
    }
    if (dateStr) extractedFields.date = dateStr;
    if (timeStr) extractedFields.time = timeStr;

    if (extractedFields.date && extractedFields.time && (extractedFields.doctorId || extractedFields.doctorName)) {
      console.log('All booking fields extracted, sending to Android');
      flushBooking();
    }
  }

  // ── Booking confirmation detected (assistant says "booked") ──
  if (role === 'assistant' && !bookingSent && BOOKING_CONFIRM_PATTERNS.some(p => p.test(text))) {
    console.log('Booking confirmation detected');
    flushBooking(combinedContext);
  }

  // ── Booking was confirmed AND sent → auto-end after pause ──
  if (bookingSent && !endTriggered) {
    // If we just sent booking, schedule auto-end
    scheduleEndAfterBooking();
    startInactivityMonitor();
  }

  // ── Goodbye / end-call intent detection ──
  if (role === 'assistant' && !endTriggered && END_CALL_PATTERNS.some(p => p.test(text))) {
    console.log('End-call pattern detected');
    // Flush any unsent booking
    if (!bookingSent) flushBooking(combinedContext);
    
    // If booking was sent, short delay; if no booking, quick end
    if (bookingSent) {
      scheduleEndAfterBooking();
    } else {
      scheduleEndQuick();
    }
  }
}

// ── Fetch doctors availability ──
async function fetchAvailability() {
  try {
    const url = API_BASE + 'doctors/availability?days=7';
    const resp = await fetch(url);
    const json = await resp.json();
    if (json.success && json.data) {
      availableDoctors = json.data.map(d => ({
        id: d.id || d.doctorId,
        firstName: d.firstName,
        lastName: d.lastName,
        specialties: d.specialties,
        fee: d.fee
      }));
      if (vapi && vapi.isConnected) {
        vapi.updateMetadata({ availableDoctors, doctorCount: String(availableDoctors.length) });
      }
    }
  } catch(e) {
    console.error('Failed to fetch availability:', e);
  }
}

// ── Start the call ──
function start() {
  try {
    vapi = new Vapi(PUBLIC_KEY);
  } catch (e) {
    notifyState('error', { message: 'Setup failed: ' + (e?.message || 'unknown') });
    return;
  }

  vapi.on('call-start', () => {
    connected = true;
    callStartTime = Date.now();
    notifyState('connected', {});
    startTimer();
  });

  vapi.on('call-end', () => {
    connected = false;
    stopTimer();
    notifyState('disconnected', {});

    // Final flush of unsent booking
    if (!bookingSent) {
      const fullContext = [...assistantContext, ...userContext].join(' ');
      flushBooking(fullContext);
    }
    if (bookingSent) notifyBookingDone(extractedFields);

    // Notify Android of end
    notifyCallEnded();
  });

  vapi.on('speech-start', () => {
    notifyState('speaking', {});
  });

  vapi.on('speech-end', () => {
    if (connected) notifyState('listening', {});
  });

  // ── Function calls from VAPI assistant ──
  vapi.on('function-call', (funcCall) => {
    console.log('Function call:', funcCall.name, JSON.stringify(funcCall.parameters));

    if (/^(endCall|end_call|hangup|disconnect|end)$/i.test(funcCall.name)) {
      vapi.sendFunctionResult(funcCall.id, { success: true });
      if (!endTriggered) scheduleEnd(500);
      return;
    }

    if (/^(bookAppointment|scheduleAppointment|book_appointment|createAppointment|book)$/i.test(funcCall.name)) {
      const p = funcCall.parameters;
      console.log('Book function params:', JSON.stringify(p));
      
      // Forward structured data directly (most reliable path)
      if (p.doctorId) notifyMetadata('doctorId', p.doctorId);
      if (p.doctorName) notifyMetadata('doctorName', p.doctorName);
      if (p.appointmentDate || p.date) notifyMetadata('appointmentDate', p.appointmentDate || p.date);
      if (p.startTime || p.time || p.appointmentTime) notifyMetadata('appointmentTime', p.startTime || p.time || p.appointmentTime);
      if (p.reason) notifyMetadata('reason', p.reason);
      
      bookingSent = true;
      
      vapi.sendFunctionResult(funcCall.id, { success: true, message: 'Appointment data captured' });
      
      // Start booking end timer
      scheduleEndAfterBooking();
      startInactivityMonitor();
      return;
    }
  });

  // ── Transcript events from VAPI ──
  vapi.on('message', (msg) => {
    if (msg && msg.type === 'transcript' && msg.transcript) {
      const role = msg.role === 'assistant' ? 'assistant' : 'user';
      if (msg.transcriptType === 'final') {
        addBubble(role, msg.transcript);
      }
    }
  });

  vapi.on('error', (e) => {
    console.error('VAPI error:', e);
    const errorMsg = (typeof e === 'string' ? e : e?.message) || 'Something went wrong';
    notifyState('error', { message: errorMsg });
  });

  const metadata = {};
  if (USER_JWT) metadata.jwt = USER_JWT;
  if (USER_NAME) metadata.userName = USER_NAME;
  metadata.source = 'mediconnect-android';
  if (availableDoctors.length > 0) {
    metadata.availableDoctors = availableDoctors;
    metadata.doctorCount = String(availableDoctors.length);
  }

  try {
    vapi.start(ASSISTANT_ID, { metadata });
    notifyState('connecting', {});
  } catch (e) {
    notifyState('error', { message: e?.message || 'Failed to start' });
  }
}

// ── End the call ──
function end() {
  if (endTriggered && connected === false) return;
  if (!endTriggered) endTriggered = true;

  // Final flush
  if (!bookingSent) {
    const ctx = [...assistantContext, ...userContext].join(' ');
    flushBooking(ctx);
  }
  if (bookingSent) notifyBookingDone(extractedFields);

  stopTimer();
  if (vapi) {
    try { vapi.stop(); } catch(e) {}
  }
}

// ── Timer ──
function startTimer() {
  callStartTime = Date.now();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!callStartTime) return;
    const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
    const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const secs = String(elapsed % 60).padStart(2, '0');
    notifyState('timer', { elapsed, display: mins + ':' + secs });
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
}

// ── Doctor name matching (unchanged logic) ──
function findDoctor(text) {
  if (!text) return null;
  function matched(doc) { return { id: doc.id, firstName: doc.firstName, lastName: doc.lastName }; }
  if (availableDoctors.length > 0) {
    const m1 = text.match(/(?:Dr\.?|Doctor)\s+([A-Z][a-z]+(?:\s+[A-Z][a-z]+)?)/);
    let nameStr = m1 ? m1[1].trim().toLowerCase() : null;
    if (!nameStr) {
      for (const doc of availableDoctors) {
        if (new RegExp('\\b' + doc.lastName.toLowerCase() + '\\b', 'i').test(text)) return matched(doc);
      }
    } else {
      for (const doc of availableDoctors) {
        if ((doc.firstName + ' ' + doc.lastName).toLowerCase() === nameStr) return matched(doc);
      }
      for (const doc of availableDoctors) {
        if (nameStr.includes(doc.lastName.toLowerCase()) || doc.lastName.toLowerCase().includes(nameStr)) return matched(doc);
      }
    }
  }
  const raw = text.match(/(?:Dr\.?|Doctor)\s+([A-Z][a-z]+(?:\s+[A-Z][a-z]+)?)/i);
  if (raw) return { id: null, firstName: raw[1].trim(), lastName: '' };
  return null;
}

function extractDate(text) {
  if (!text) return null;
  const iso = text.match(/\b(\d{4}-\d{2}-\d{2})\b/);
  if (iso) return iso[1];
  const lower = text.toLowerCase();
  const today = new Date();
  if (/\btoday\b/.test(lower)) return fmtDate(today);
  if (/\btomorrow\b/.test(lower)) return fmtDate(new Date(today.getTime() + 86400000));
  const stripped = text.replace(/(\d+)(st|nd|rd|th)\b/gi, '$1');
  const monthDayYear = stripped.match(/(\w+)\s+(\d{1,2})[,\s]+(\d{4})\b/);
  if (monthDayYear) {
    const m = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'].indexOf(monthDayYear[1].substring(0,3).toLowerCase());
    if (m >= 0) return monthDayYear[3] + '-' + String(m + 1).padStart(2, '0') + '-' + String(monthDayYear[2]).padStart(2, '0');
  }
  const dayMonthYear = stripped.match(/\b(\d{1,2})\s+(\w+)\s+(\d{4})\b/);
  if (dayMonthYear) {
    const m = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'].indexOf(dayMonthYear[2].substring(0,3).toLowerCase());
    if (m >= 0) return dayMonthYear[3] + '-' + String(m + 1).padStart(2, '0') + '-' + String(dayMonthYear[1]).padStart(2, '0');
  }
  const dayNames = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const nextDayMatch = lower.match(/next\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday)/);
  if (nextDayMatch) {
    const targetDay = dayNames.indexOf(nextDayMatch[1]);
    if (targetDay >= 0) {
      const currentDay = today.getDay();
      let daysUntil = targetDay - currentDay;
      if (daysUntil <= 0) daysUntil += 7;
      return fmtDate(new Date(today.getTime() + daysUntil * 86400000));
    }
  }
  return null;
}

function fmtDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function extractTime(text) {
  const colonMatch = text.match(/\b(\d{1,2}:\d{2})\s*(AM|PM)?\b/i);
  if (colonMatch) {
    let t = colonMatch[1];
    if (colonMatch[2]) t = t + ' ' + colonMatch[2].toUpperCase();
    return t;
  }
  const noColonMatch = text.match(/\b(\d{1,2})\s*(AM|PM)\b/i);
  if (noColonMatch) return noColonMatch[1] + ':00 ' + noColonMatch[2].toUpperCase();
  return null;
}

// ── Exported bridge for Kotlin to call ──
window.VapiBridge = {
  start, end,
  setAuth(jwt, userName) { USER_JWT = jwt || ''; USER_NAME = userName || ''; },
  setDoctors(jsonStr) {
    try {
      const docs = JSON.parse(jsonStr);
      availableDoctors = docs;
      if (vapi && vapi.isConnected) vapi.updateMetadata({ availableDoctors: docs, doctorCount: String(docs.length) });
    } catch(e) { console.error('setDoctors failed:', e); }
  },
  resetState() {
    endTriggered = false;
    bookingSent = false;
    assistantContext = [];
    userContext = [];
    extractedFields = { doctorId: null, doctorName: null, date: null, time: null, reason: null };
    bookingEndTimeoutId = null;
    if (inactivityCheckId) { clearInterval(inactivityCheckId); inactivityCheckId = null; }
  },
};

fetchAvailability();
start();
</script>
