<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MediConnect AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0f;
    color: #fff;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    padding-top: 24px;
    flex-shrink: 0;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-mic-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #22c55e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .header-title {
    font-size: 16px;
    font-weight: 600;
    color: #fff;
  }
  .header-close {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: #fff;
    border: none;
    -webkit-tap-highlight-color: transparent;
  }
  .header-close:active { background: rgba(255,255,255,0.25); }

  .mic-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  .mic-circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: #475569;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    transition: background 0.3s ease;
    box-shadow: 0 0 0 0 rgba(0,0,0,0);
  }
  .mic-circle.listening {
    background: #22c55e;
    animation: pulse-glow 2s ease-in-out infinite;
  }
  .mic-circle.speaking {
    background: #3b82f6;
    animation: pulse-glow-blue 2s ease-in-out infinite;
  }
  .mic-circle.error {
    background: #ef4444;
    animation: pulse-glow-red 2s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5); }
    50% { box-shadow: 0 0 30px 10px rgba(34, 197, 94, 0.2); }
    100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5); }
  }
  @keyframes pulse-glow-blue {
    0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5); }
    50% { box-shadow: 0 0 30px 10px rgba(59, 130, 246, 0.2); }
    100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5); }
  }
  @keyframes pulse-glow-red {
    0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
    50% { box-shadow: 0 0 30px 10px rgba(239, 68, 68, 0.2); }
    100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
  }

  .status-text {
    font-size: 16px;
    font-weight: 500;
    margin-top: 16px;
    color: #fff;
    min-height: 22px;
    text-align: center;
  }
  .sub-status {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-top: 4px;
    min-height: 16px;
    text-align: center;
  }

  .chat-area {
    flex-shrink: 0;
    max-height: 200px;
    overflow-y: auto;
    padding: 0 20px 16px;
    display: none;
    -webkit-overflow-scrolling: touch;
  }
  .chat-area.visible { display: block; }
  .chat-bubble {
    margin-bottom: 8px;
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.4;
    word-wrap: break-word;
  }
  .chat-bubble.user {
    background: #2563eb;
    color: #fff;
    margin-left: auto;
    border-bottom-right-radius: 4px;
  }
  .chat-bubble.assistant {
    background: #1e293b;
    color: #e2e8f0;
    margin-right: auto;
    border-bottom-left-radius: 4px;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="header-mic-icon">🎤</div>
      <span class="header-title">MediConnect AI</span>
    </div>
    <button class="header-close" id="closeBtn">✕</button>
  </div>

  <div class="mic-area">
    <div class="mic-circle" id="micCircle">🎤</div>
    <div class="status-text" id="statusText">Connecting...</div>
    <div class="sub-status" id="subStatus">Starting AI voice assistant</div>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <script type="importmap">
  {
    "imports": {
      "@vapi-ai/web": "https://esm.sh/@vapi-ai/web@latest"
    }
  }
  </script>
  <script type="module">
    import Vapi from '@vapi-ai/web';

    const ASSISTANT_ID = '__ASSISTANT_ID__';
    const PUBLIC_KEY  = '***';

    const micCircle = document.getElementById('micCircle');
    const statusText = document.getElementById('statusText');
    const subStatus = document.getElementById('subStatus');
    const chatArea = document.getElementById('chatArea');
    const closeBtn = document.getElementById('closeBtn');

    let vapi = null;
    let connected = false;

    function setStatus(state, msg, sub) {
      // Reset classes first
      micCircle.className = 'mic-circle';

      if (state === 'listening') {
        micCircle.classList.add('listening');
      } else if (state === 'speaking') {
        micCircle.classList.add('speaking');
      } else if (state === 'error') {
        micCircle.classList.add('error');
      }

      statusText.textContent = msg || '';
      subStatus.textContent = sub || '';
    }

    function addBubble(role, text) {
      chatArea.style.display = 'block';
      const bubble = document.createElement('div');
      bubble.className = 'chat-bubble ' + role;
      bubble.textContent = text;
      chatArea.appendChild(bubble);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function start() {
      try {
        vapi = new Vapi(PUBLIC_KEY);
      } catch (e) {
        console.error('Vapi init failed:', e);
        setStatus('error', 'Setup failed', e?.message || 'Please try again');
        return;
      }

      // Connection established
      vapi.on('call-start', () => {
        connected = true;
        setStatus('listening', 'Connected', "I'm listening — go ahead!");
      });

      // Call ended gracefully
      vapi.on('call-end', () => {
        connected = false;
        setStatus(null, 'Call ended', 'You can close this window');
      });

      // AI is speaking
      vapi.on('speech-start', () => {
        setStatus('speaking', 'Assistant is speaking...', '');
      });

      // AI finished, listening again
      vapi.on('speech-end', () => {
        if (connected) {
          setStatus('listening', 'Listening...', 'Your turn to speak');
        }
      });

      // Messages (transcripts, etc.)
      vapi.on('message', (msg) => {
        if (msg && msg.type === 'transcript' && msg.transcript && msg.transcriptType === 'final') {
          const role = msg.role === 'assistant' ? 'assistant' : 'user';
          addBubble(role, msg.transcript);
        }
      });

      // Errors — only show if NOT connected yet (during setup errors)
      vapi.on('error', (e) => {
        console.error('VAPI error:', e);
        const errorMsg = (typeof e === 'string' ? e : e?.message) || 'Something went wrong';

        if (!connected) {
          // Failure during setup/connection
          if (/microphone|permission|denied/i.test(errorMsg)) {
            setStatus('error', 'Microphone access needed', 'Allow mic in your phone settings');
          } else if (/network|fetch|timeout/i.test(errorMsg)) {
            setStatus('error', 'Connection problem', 'Check your internet');
          } else {
            setStatus('error', 'Connection error', errorMsg.length < 60 ? errorMsg : 'Please try again');
          }
        } else {
          // Connected but had an error mid-call — show briefly as red but keep UI alive
          setStatus('speaking', 'Reconnecting...', 'Just a moment');
          setTimeout(() => {
            if (connected) setStatus('listening', 'Listening...', 'Your turn to speak');
          }, 2000);
        }
      });

      // Initial state
      setStatus(null, 'Connecting...', 'Establishing voice connection');

      try {
        vapi.start(ASSISTANT_ID);
      } catch (e) {
        console.error('Vapi start failed:', e);
        setStatus('error', 'Failed to start', e?.message || 'Please try again');
      }
    }

    function end() {
      try {
        if (vapi) vapi.stop();
      } catch (e) { /* ignore */ }
    }

    closeBtn.addEventListener('click', end);

    // Auto-start
    start();

    // Bridge for Android
    window.VapiBridge = { start, end };
  </script>
</body>
</html>
