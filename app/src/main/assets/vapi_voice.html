<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MediConnect AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0f;
    color: #fff;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding-top: 72px; /* room for the Android-side top bar */
  }

  .mic-area {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 0;
    padding: 24px 20px 12px;
  }

  .mic-circle {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: #475569;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    transition: background 0.3s ease;
    box-shadow: 0 0 0 0 rgba(0,0,0,0);
  }
  .mic-circle.listening {
    background: #22c55e;
    animation: pulse-glow 2s ease-in-out infinite;
  }
  .mic-circle.speaking {
    background: #3b82f6;
    animation: pulse-glow-blue 2s ease-in-out infinite;
  }
  .mic-circle.error {
    background: #ef4444;
    animation: pulse-glow-red 2s ease-in-out infinite;
  }
  .mic-circle.thinking {
    background: #a855f7;
    animation: pulse-glow-purple 1.2s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5); }
    50% { box-shadow: 0 0 30px 10px rgba(34, 197, 94, 0.2); }
    100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5); }
  }
  @keyframes pulse-glow-blue {
    0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5); }
    50% { box-shadow: 0 0 30px 10px rgba(59, 130, 246, 0.2); }
    100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5); }
  }
  @keyframes pulse-glow-red {
    0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
    50% { box-shadow: 0 0 30px 10px rgba(239, 68, 68, 0.2); }
    100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
  }
  @keyframes pulse-glow-purple {
    0% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.5); }
    50% { box-shadow: 0 0 30px 10px rgba(168, 85, 247, 0.2); }
    100% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.5); }
  }

  .status-text {
    font-size: 17px;
    font-weight: 600;
    margin-top: 20px;
    color: #fff;
    min-height: 24px;
    text-align: center;
  }
  .sub-status {
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    margin-top: 6px;
    min-height: 18px;
    text-align: center;
  }

  /* Voice-to-text transcript window — always present, scrollable, responsive */
  .transcript-window {
    flex: 0 0 auto;
    height: 40vh;
    min-height: 180px;
    max-height: 50vh;
    margin: 8px 16px 24px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .transcript-window::-webkit-scrollbar { width: 6px; }
  .transcript-window::-webkit-scrollbar-track { background: transparent; }
  .transcript-window::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

  .transcript-empty {
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    text-align: center;
    margin: auto 0;
  }

  .chat-bubble {
    max-width: 88%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.4;
    word-wrap: break-word;
    animation: bubble-in 0.25s ease-out;
  }
  @keyframes bubble-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .chat-bubble.user {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: #fff;
    margin-left: auto;
    border-bottom-right-radius: 6px;
  }
  .chat-bubble.assistant {
    background: rgba(255,255,255,0.08);
    color: #f1f5f9;
    margin-right: auto;
    border-bottom-left-radius: 6px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .live-interim {
    align-self: flex-start;
    max-width: 88%;
    padding: 8px 12px;
    border-radius: 14px;
    background: rgba(34,197,94,0.10);
    border: 1px dashed rgba(34,197,94,0.30);
    color: rgba(255,255,255,0.55);
    font-size: 13px;
    font-style: italic;
  }
</style>
</head>
<body>
  <div class="mic-area">
    <div class="mic-circle" id="micCircle">🎤</div>
    <div class="status-text" id="statusText">Connecting...</div>
    <div class="sub-status" id="subStatus">Starting AI voice assistant</div>
  </div>

  <div class="transcript-window" id="transcriptWindow" aria-live="polite">
    <div class="transcript-empty" id="transcriptEmpty">Conversation will appear here</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "@vapi-ai/web": "https://esm.sh/@vapi-ai/web@latest"
    }
  }
  </script>
  <script type="module">
    import Vapi from '@vapi-ai/web';

    const ASSISTANT_ID = '__ASSISTANT_ID__';
    const PUBLIC_KEY  = '__PUBLIC_KEY__';
    // Filled by Android before .start(). Carried into Vapi's call metadata so
    // the server-side webhook (bookAppointment, etc.) can resolve the user.
    const USER_JWT = '__USER_JWT__';
    const USER_NAME = '__USER_NAME__';

    const micCircle = document.getElementById('micCircle');
    const statusText = document.getElementById('statusText');
    const subStatus = document.getElementById('subStatus');
    const transcriptWindow = document.getElementById('transcriptWindow');
    const transcriptEmpty = document.getElementById('transcriptEmpty');

    let vapi = null;
    let connected = false;
    let interimEl = null;

    function setStatus(state, msg, sub) {
      // Reset classes first
      micCircle.className = 'mic-circle';

      if (state === 'listening') {
        micCircle.classList.add('listening');
      } else if (state === 'speaking') {
        micCircle.classList.add('speaking');
      } else if (state === 'error') {
        micCircle.classList.add('error');
      } else if (state === 'thinking') {
        micCircle.classList.add('thinking');
      }

      statusText.textContent = msg || '';
      subStatus.textContent = sub || '';
    }

    function clearInterim() {
      if (interimEl && interimEl.parentNode) {
        interimEl.parentNode.removeChild(interimEl);
      }
      interimEl = null;
    }

    function addBubble(role, text) {
      clearInterim();
      if (transcriptEmpty && transcriptEmpty.parentNode) {
        transcriptEmpty.parentNode.removeChild(transcriptEmpty);
      }
      const bubble = document.createElement('div');
      bubble.className = 'chat-bubble ' + role;
      bubble.textContent = text;
      transcriptWindow.appendChild(bubble);
      transcriptWindow.scrollTop = transcriptWindow.scrollHeight;
    }

    function showInterim(text) {
      if (!text || !text.trim()) {
        clearInterim();
        return;
      }
      if (!interimEl) {
        clearInterim();
        interimEl = document.createElement('div');
        interimEl.className = 'live-interim';
        transcriptWindow.appendChild(interimEl);
      }
      interimEl.textContent = text;
      transcriptWindow.scrollTop = transcriptWindow.scrollHeight;
    }

    function start() {
      try {
        vapi = new Vapi(PUBLIC_KEY);
      } catch (e) {
        console.error('Vapi init failed:', e);
        setStatus('error', 'Setup failed', e?.message || 'Please try again');
        return;
      }

      // Connection established
      vapi.on('call-start', () => {
        connected = true;
        setStatus('listening', 'Connected', "I'm listening — go ahead!");
      });

      // Call ended gracefully
      vapi.on('call-end', () => {
        connected = false;
        clearInterim();
        setStatus(null, 'Call ended', 'You can close this window');
        // Notify Android side so it can run the closing transition.
        try { window.VapiBridge?.onRemoteEnd?.(); } catch (e) {}
      });

      // AI is speaking
      vapi.on('speech-start', () => {
        setStatus('speaking', 'Assistant is speaking...', '');
      });

      // AI finished, listening again
      vapi.on('speech-end', () => {
        if (connected) {
          setStatus('listening', 'Listening...', 'Your turn to speak');
        }
      });

      // Messages (final transcripts go permanent; partials show as a live interim line)
      vapi.on('message', (msg) => {
        if (msg && msg.type === 'transcript' && msg.transcript) {
          const role = msg.role === 'assistant' ? 'assistant' : 'user';
          if (msg.transcriptType === 'final') {
            addBubble(role, msg.transcript);
          } else if (msg.transcriptType === 'partial' && role === 'user') {
            // Surface live user speech so the window feels responsive
            showInterim(msg.transcript);
          }
        }
    });

      // Errors — only show if NOT connected yet (during setup errors)
      vapi.on('error', (e) => {
        console.error('VAPI error:', e);
        const errorMsg = (typeof e === 'string' ? e : e?.message) || 'Something went wrong';

        if (!connected) {
          // Failure during setup/connection
          if (/microphone|permission|denied/i.test(errorMsg)) {
            setStatus('error', 'Microphone access needed', 'Allow mic in your phone settings');
          } else if (/network|fetch|timeout/i.test(errorMsg)) {
            setStatus('error', 'Connection problem', 'Check your internet');
          } else {
            setStatus('error', 'Connection error', errorMsg.length < 60 ? errorMsg : 'Please try again');
          }
        } else {
          // Connected but had an error mid-call — show briefly as red but keep UI alive
          setStatus('speaking', 'Reconnecting...', 'Just a moment');
          setTimeout(() => {
            if (connected) setStatus('listening', 'Listening...', 'Your turn to speak');
          }, 2000);
        }
      });

      // Initial state
      setStatus(null, 'Connecting...', 'Establishing voice connection');

      // Build call metadata so the backend knows which user owns this call.
      // The metadata travels with every server-tool webhook VAPI fires.
      const metadata = {};
      if (USER_JWT) metadata.jwt = USER_JWT;
      if (USER_NAME) metadata.userName = USER_NAME;
      metadata.source = 'mediconnect-android';

      try {
        vapi.start(ASSISTANT_ID, { metadata });
      } catch (e) {
        console.error('Vapi start failed:', e);
        setStatus('error', 'Failed to start', e?.message || 'Please try again');
      }
    }

    function end() {
      try {
        if (vapi) vapi.stop();
      } catch (e) { /* ignore */ }
    }

    // Auto-start
    start();

    // Bridge for Android
    window.VapiBridge = {
      start,
      end,
      setAuth(jwt, userName) {
        USER_JWT = jwt || '';
        USER_NAME = userName || '';
      },
    };
  </script>
</body>
</html>
